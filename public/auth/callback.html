<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirmando acesso — DoceriaPedagógica</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: #faf7f2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    color: #1a1917;
  }
  .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #0f0e0c;
  }
  .logo span { color: #c8963e; }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(200,150,62,0.2);
    border-top-color: #c8963e;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg {
    font-size: 16px;
    color: #4a4845;
    text-align: center;
    max-width: 300px;
    line-height: 1.5;
  }
  .error {
    background: #fdeee9;
    border: 1px solid #f5c6b8;
    border-radius: 10px;
    padding: 16px 24px;
    color: #d95f3b;
    font-size: 14px;
    max-width: 340px;
    text-align: center;
  }
  .btn {
    padding: 12px 28px;
    background: #c8963e;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
  }
</style>
</head>
<body>

<div class="logo">Doceria<span>Pedagógica</span></div>
<div class="spinner" id="spinner"></div>
<p class="msg" id="msg">Confirmando seu acesso, aguarde um momento...</p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://atkwvwhwbkerezdmipxw.supabase.co',
    'sb_publishable_zWPrTWOrbMSCnD1uwOWulg_borGCRbZ'
  );

  async function handleCallback() {
    const params = new URLSearchParams(window.location.search);
    const hashParams = new URLSearchParams(window.location.hash.replace('#', '?').replace('#',''));
    const errorCode = params.get('error') || hashParams.get('error');
    const errorDesc = params.get('error_description') || hashParams.get('error_description');

    if (errorCode) {
      showError(decodeURIComponent((errorDesc || errorCode).replace(/\+/g, ' ')));
      return;
    }

    // PKCE flow: troca o code por sessão
    const code = params.get('code');
    if (code) {
      const { error } = await sb.auth.exchangeCodeForSession(window.location.href);
      if (error) { showError(error.message); return; }
    }

    // Implicit flow: token no hash — SDK já detecta automaticamente
    const accessToken = hashParams.get('access_token');
    if (accessToken) {
      const refreshToken = hashParams.get('refresh_token');
      const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      if (error) { showError(error.message); return; }
    }

    // Verifica sessão estabelecida
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      document.getElementById('msg').textContent = '✅ Conta confirmada! Entrando no painel...';
      document.getElementById('spinner').style.display = 'none';
      setTimeout(() => { window.location.replace('/conta.html'); }, 1200);
    } else {
      // Aguarda o SDK processar (onAuthStateChange pode demorar um tick)
      const unsub = sb.auth.onAuthStateChange((event, s) => {
        if (event === 'SIGNED_IN' && s) {
          unsub.data?.subscription?.unsubscribe?.();
          document.getElementById('msg').textContent = '✅ Conta confirmada! Entrando no painel...';
          document.getElementById('spinner').style.display = 'none';
          setTimeout(() => { window.location.replace('/conta.html'); }, 1200);
        }
      });
      // Timeout de segurança
      setTimeout(() => {
        sb.auth.getSession().then(({ data }) => {
          if (data.session) {
            window.location.replace('/conta.html');
          } else {
            showError('Não foi possível confirmar a sessão. Tente fazer login manualmente.');
          }
        });
      }, 5000);
    }
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    const err = document.createElement('div');
    err.className = 'error';
    err.textContent = '⚠️ ' + msg;
    document.body.appendChild(err);
    const btn = document.createElement('a');
    btn.href = '/conta.html';
    btn.className = 'btn';
    btn.textContent = 'Ir para login →';
    document.body.appendChild(btn);
  }

  handleCallback();
</script>
</body>
</html>
