<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img"><rect width="100%" height="100%" fill="#fff"/><text x="360" y="28" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#1a1917" text-anchor="middle">Setores da economia</text><text x="360" y="47" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="500" fill="#6b6764" text-anchor="middle">As três etapas da produção</text><defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#6b6764"/></marker></defs><rect x="40" y="78" width="196" height="158" rx="12" fill="#fff" stroke="#4a8b5a" stroke-width="2"/><rect x="40" y="78" width="196" height="34" rx="12" fill="#4a8b5a"/><rect x="40" y="100" width="196" height="12" fill="#4a8b5a"/><text x="138" y="101" font-family="Arial,Helvetica,sans-serif" font-size="12.5" font-weight="800" fill="#fff" text-anchor="middle">Setor Primário</text><text x="138" y="136" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">Retira da natureza</text><text x="138" y="186" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="500" fill="#6b6764" text-anchor="middle">agricultura, pecuária,</text><text x="138" y="200" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="500" fill="#6b6764" text-anchor="middle">pesca, extração</text><line x1="240" y1="157" x2="258" y2="157" stroke="#6b6764" stroke-width="2"/><line x1="240" y1="157" x2="260" y2="157" stroke="#6b6764" stroke-width="2" marker-end="url(#a)"/><rect x="262" y="78" width="196" height="158" rx="12" fill="#fff" stroke="#c8963e" stroke-width="2"/><rect x="262" y="78" width="196" height="34" rx="12" fill="#c8963e"/><rect x="262" y="100" width="196" height="12" fill="#c8963e"/><text x="360" y="101" font-family="Arial,Helvetica,sans-serif" font-size="12.5" font-weight="800" fill="#fff" text-anchor="middle">Setor Secundário</text><text x="360" y="136" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">Transforma a</text><text x="360" y="151" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">matéria-prima</text><text x="360" y="186" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="500" fill="#6b6764" text-anchor="middle">indústrias,</text><text x="360" y="200" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="500" fill="#6b6764" text-anchor="middle">fábricas, construção</text><line x1="462" y1="157" x2="480" y2="157" stroke="#6b6764" stroke-width="2"/><line x1="462" y1="157" x2="482" y2="157" stroke="#6b6764" stroke-width="2" marker-end="url(#a)"/><rect x="484" y="78" width="196" height="158" rx="12" fill="#fff" stroke="#2d6e6e" stroke-width="2"/><rect x="484" y="78" width="196" height="34" rx="12" fill="#2d6e6e"/><rect x="484" y="100" width="196" height="12" fill="#2d6e6e"/><text x="582" y="101" font-family="Arial,Helvetica,sans-serif" font-size="12.5" font-weight="800" fill="#fff" text-anchor="middle">Setor Terciário</text><text x="582" y="136" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">Vende produtos</text><text x="582" y="151" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">e presta serviços</text><text x="582" y="186" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="500" fill="#6b6764" text-anchor="middle">comércio, escola,</text><text x="582" y="200" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="500" fill="#6b6764" text-anchor="middle">hospital, transporte</text></svg>