xt><text x="60" y="224" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#2d6e6e" text-anchor="start">1 : 5.000.000</text><text x="60" y="246" font-family="Arial,Helvetica,sans-serif" font-size="10.5" font-weight="500" fill="#6b6764" text-anchor="start">1 cm no mapa = 50 km no real</text><rect x="370" y="78" width="250" height="210" rx="10" fill="#fff" stroke="#c9c4bd" stroke-width="1.5"/><text x="495" y="100" font-family="Arial,Helvetica,sans-serif" font-size="12.5" font-weight="800" fill="#1a1917" text-anchor="middle">Legenda</text><g transform="translate(0 128)"><circle cx="392" cy="0" r="6" fill="#d95f3b"/><path d="M392,-9 l4,7 h-8 z" fill="#d95f3b"/></g><text x="412" y="132" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="#1a1917" text-anchor="start">Capital</text><g transform="translate(0 158)"><circle cx="392" cy="0" r="5" fill="#fff" stroke="#1a1917" stroke-width="1.6"/></g><text x="412" y="162" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="#1a1917" text-anchor="start">Cidade</text><g transform="translate(0 188)"><path d="M384,2 q8,-10 16,0" fill="none" stroke="#3f7bab" stroke-width="2.4"/></g><text x="412" y="192" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="#1a1917" text-anchor="start">Rio</text><g transform="translate(0 218)"><line x1="384" y1="0" x2="400" y2="0" stroke="#7a6a1a" stroke-width="3"/></g><text x="412" y="222" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="#1a1917" text-anchor="start">Rodovia</text><g transform="translate(0 248)"><rect x="385" y="-6" width="14" height="12" fill="#4a8b5a" opacity=".55"/></g><text x="412" y="252" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="#1a1917" text-anchor="start">Floresta / vegetação</text></svg>