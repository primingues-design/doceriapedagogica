t-size="10.5" font-weight="800" fill="#d95f3b" text-anchor="middle">Meridiano de Greenwich (0°)</text><text x="66.66666666666667" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">−6h</text><text x="120.00000000000001" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">−5h</text><text x="173.33333333333334" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">−4h</text><text x="226.66666666666666" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">−3h</text><text x="280" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">−2h</text><text x="333.33333333333337" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">−1h</text><text x="386.6666666666667" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">0h</text><text x="440.00000000000006" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">+1h</text><text x="493.33333333333337" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">+2h</text><text x="546.6666666666666" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">+3h</text><text x="600" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">+4h</text><text x="653.3333333333334" y="142" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="700" fill="#1a1917" text-anchor="middle">+5h</text><line x1="226.66666666666666" y1="186" x2="226.66