<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" role="img"><rect width="100%" height="100%" fill="#fff"/><text x="360" y="28" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#1a1917" text-anchor="middle">Tipos de relevo</text><text x="360" y="47" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="500" fill="#6b6764" text-anchor="middle">As principais formas da superfície terrestre</text><rect x="40" y="70" width="640" height="180" fill="#eaf4fb"/><line x1="40" y1="250" x2="680" y2="250" stroke="#3f7bab" stroke-width="1.4" stroke-dasharray="5 4"/><line x1="628" y1="120" x2="628" y2="250" stroke="#3f7bab" stroke-width="1" stroke-dasharray="3 3"/><text x="628" y="112" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="600" fill="#3f7bab" text-anchor="middle">nível do mar</text><polygon points="60,250 150,110 240,250" fill="#8d7b66" stroke="#6b5b4a" stroke-width="1.5"/><polygon points="120,152 150,110 180,152" fill="#fff" stroke="#ddd" stroke-width="1"/><text x="150" y="272" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="800" fill="#1a1917" text-anchor="middle">Montanha</text><text x="150" y="288" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="500" fill="#6b6764" text-anchor="middle">muito alta e íngreme</text><polygon points="270,250 270,175 420,175 440,250" fill="#4a8b5a" stroke="#3a6e46" stroke-width="1.5"/><text x="345" y="168" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="800" fill="#1a1917" text-anchor="middle">Planalto</text><text x="345" y="272" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="500" fill="#6b6764" text-anchor="middle">terreno alto e plano</text><rect x="460" y="230" width="130" height="20" fill="#9bce7e"/><polygon points="460,230 590,230 590,250 460,250" fill="#9bce7e" stroke="#6ba04e" stroke-width="1.5"/><text x="525" y="224" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="800" fill="#1a1917" text-anchor="middle">Planície</text><text x="525" y="272" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="500" fill="#6b6764" text-anchor="middle">baixa e plana</text><path d="M600,250 Q640,300 680,250 Z" fill="#c9a26a" stroke="#a37f45" stroke-width="1.5"/><text x="640" y="272" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="800" fill="#1a1917" text-anchor="middle">Depressão</text><text x="640" y="288" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="500" fill="#6b6764" text-anchor="middle">mais baixa que</text><text x="640" y="300" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="500" fill="#6b6764" text-anchor="middle">o entorno</text><line x1="40" y1="250" x2="680" y2="250" stroke="#1a1917" stroke-width="2"/></svg>