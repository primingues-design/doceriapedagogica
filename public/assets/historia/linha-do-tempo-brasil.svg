middle">1889 – hoje</text><line x1="200" y1="112" x2="200" y2="200" stroke="#1a1917" stroke-width="1.6"/><text x="200" y="218" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">1500</text><text x="200" y="230.5" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">chegada dos</text><text x="200" y="243" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">portugueses</text><line x1="360" y1="112" x2="360" y2="200" stroke="#1a1917" stroke-width="1.6"/><text x="360" y="218" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">1822</text><text x="360" y="230.5" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">Independência</text><line x1="520" y1="112" x2="520" y2="200" stroke="#1a1917" stroke-width="1.6"/><text x="520" y="218" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">1889</text><text x="520" y="230.5" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">Proclamação</text><text x="520" y="243" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">da República</text></svg>