<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img"><rect width="100%" height="100%" fill="#fff"/><text x="360" y="28" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#1a1917" text-anchor="middle">Sociedade feudal</text><text x="360" y="47" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="500" fill="#6b6764" text-anchor="middle">Como a sociedade da Idade Média era organizada</text><polygon points="211,92 289,92 343,166 157,166" fill="#6c63d4" stroke="#fff" stroke-width="2"/><text x="250" y="136" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Rei</text><line x1="347" y1="129" x2="452" y2="129" stroke="#c9c4bd" stroke-width="1"/><text x="458" y="133" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="500" fill="#6b6764" text-anchor="start">concedia terras aos nobres</text><polygon points="157,166 343,166 397,240 103,240" fill="#c8963e" stroke="#fff" stroke-width="2"/><text x="250" y="202" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Clero e Nobreza</text><text x="250" y="216" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">(senhores feudais)</text><line x1="401" y1="203" x2="452" y2="203" stroke="#c9c4bd" stroke-width="1"/><text x="458" y="207" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="500" fill="#6b6764" text-anchor="start">donos das terras (feudos)</text><polygon points="103,240 397,240 451,314 49,314" fill="#8d7b66" stroke="#fff" stroke-width="2"/><text x="250" y="284" font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Servos e camponeses</text><line x1="455" y1="277" x2="452" y2="277" stroke="#c9c4bd" stroke-width="1"/><text x="458" y="281" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="500" fill="#6b6764" text-anchor="start">maioria da população; trabalhavam a terra</text><text x="250" y="78" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">menos pessoas, mais poder</text><text x="250" y="336" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">mais pessoas, menos poder</text></svg>