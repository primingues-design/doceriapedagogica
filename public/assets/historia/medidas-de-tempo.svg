<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" role="img"><rect width="100%" height="100%" fill="#fff"/><text x="340" y="28" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#1a1917" text-anchor="middle">Como medimos o tempo</text><text x="340" y="47" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="500" fill="#6b6764" text-anchor="middle">Década, século e milênio</text><text x="118" y="108" font-family="Arial,Helvetica,sans-serif" font-size="12.5" font-weight="800" fill="#1a1917" text-anchor="end">1 década</text><rect x="132" y="84" width="90" height="34" rx="6" fill="#4a8b5a"/><text x="177" y="106" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">10 anos</text><text x="118" y="162" font-family="Arial,Helvetica,sans-serif" font-size="12.5" font-weight="800" fill="#1a1917" text-anchor="end">1 século</text><rect x="132" y="138" width="260" height="34" rx="6" fill="#2d6e6e"/><text x="262" y="160" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">100 anos</text><text x="118" y="216" font-family="Arial,Helvetica,sans-serif" font-size="12.5" font-weight="800" fill="#1a1917" text-anchor="end">1 milênio</text><rect x="132" y="192" width="470" height="34" rx="6" fill="#6c63d4"/><text x="367" y="214" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">1000 anos</text><rect x="60" y="250" width="560" height="54" rx="10" fill="#fff" stroke="#c8963e" stroke-width="2"/><text x="340" y="270" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="800" fill="#c8963e" text-anchor="middle">Como descobrir o século de um ano</text><text x="340" y="290" font-family="Arial,Helvetica,sans-serif" font-size="11" font-weight="600" fill="#6b6764" text-anchor="middle">Ano 1500 → século XVI  •  Ano 1822 → século XIX  •  Ano 2025 → século XXI</text></svg>