<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 355" role="img"><rect width="100%" height="100%" fill="#fff"/><text x="360" y="28" font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="800" fill="#1a1917" text-anchor="middle">Sociedade do Brasil Colônia</text><text x="360" y="47" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="500" fill="#6b6764" text-anchor="middle">Como a sociedade colonial era organizada</text><polygon points="204,78 296,78 348,152 152,152" fill="#c8963e" stroke="#fff" stroke-width="2"/><text x="250" y="114" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">Senhores de engenho</text><text x="250" y="128" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">e grandes proprietários</text><line x1="352" y1="115" x2="452" y2="115" stroke="#c9c4bd" stroke-width="1"/><text x="458" y="119" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="500" fill="#6b6764" text-anchor="start">donos das terras e dos engenhos</text><polygon points="152,152 348,152 400,226 100,226" fill="#2d6e6e" stroke="#fff" stroke-width="2"/><text x="250" y="196" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">Homens livres pobres</text><line x1="404" y1="189" x2="452" y2="189" stroke="#c9c4bd" stroke-width="1"/><text x="458" y="193" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="500" fill="#6b6764" text-anchor="start">feitores, artesãos, comerciantes, mestiços</text><polygon points="100,226 400,226 452,300 48,300" fill="#6b5b4a" stroke="#fff" stroke-width="2"/><text x="250" y="270" font-family="Arial,Helvetica,sans-serif" font-size="11.5" font-weight="700" fill="#fff" text-anchor="middle">Pessoas escravizadas</text><line x1="456" y1="263" x2="452" y2="263" stroke="#c9c4bd" stroke-width="1"/><text x="458" y="267" font-family="Arial,Helvetica,sans-serif" font-size="9.5" font-weight="500" fill="#6b6764" text-anchor="start">africanas e indígenas; faziam todo o trabalho</text><text x="250" y="324" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="600" fill="#6b6764" text-anchor="middle">A base da pirâmide era a maioria da população</text></svg>